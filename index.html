<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Landing Page</title>
    <link rel="stylesheet" href="src/styles/main.scss" />
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>

    <input type="checkbox" id="menu-toggle"
     class="menu-toggle">

    <header class="header" id="home">
      <div class="logo">
        <div class="logo__actions">
          <div class="logo__phone-box">
            <a href="tel:+12125357710" class="logo__phone-link">
              <img src="/src/img/Icon-Phone-call.png" class="logo__phone"
                alt="Icon-Phone-call">
            </a>
            <div class="logo__phone-tooltip">
              <strong>THE MET FIFTH AVENUE</strong>
              <span>+1 212-535-7710</span>
              <strong>THE MET CLOISTERS</strong>
              <span>+1 212-923-3700</span>
            </div>
          </div>
          <label for="menu-toggle" class="logo__menu-label">
            <img src="/src/img/Icon-Burger-menu.png" class="logo__menu"
              alt="Icon-Burger-menu">
          </label>
        </div>
        <img src="/src/img/THE MET.png" alt="The Met"
          class="logo__brand">
      </div>
    </header>

    <nav class="sidebar">
      <label for="menu-toggle" class="sidebar__close">
        <span></span>
        <span></span>
      </label>
      <div class="sidebar__brand">
        <img src="/src/img/THE MET.png" alt="The met"
        class="logo__brand">
      </div>

      <ul class="sidebar__list">
        <li><a href="#home">home</a></li>
        <li class="active"><a href="#about">about us</a></li>
        <li><a href="#gallery">gallery</a></li>
        <li><a href="#gallery">explore online</a></li>
        <li><a href="#contacts">contacts</a></li>
      </ul>

      <div class="sidebar__contacts">
        <p class="sidebar__contact-title">THE MET FIFTH AVANUE</p>
        <a href="tel:+12125357710" class="sidebar__contact-phone">+1 212-535-7710</a>

        <p class="sidebar__contact-title">THE MET CLOISTERS</p>
        <a href="tel:+12129233700" class="sidebar__contact-phone">+1 212-923-3700</a>

        <a href="tel:+12125357710" class="sidebar__order">CALL TO ORDER</a>
      </div>
    </nav>

    <div class="container">
      <img src="https://i.ibb.co/B5R89tGy/img-Photo.png"
           class="header__image"
           alt="imgPhoto">
      <div class="title"></div>
    </div>

    <section class="section" id="about">
      <div class="sectionTitle">
        <img src="/src/img/titles.png" alt="Title"
        class="section__title">
      </div>
      <div class="section__fragment">
        <img src="/src/img/Text.png" alt="Text"
         class="section__text">
      </div>
    </section>

    <article class="article" id="gallery">
      <div class="titleGalery">
        <img src="/src/img/Title Gallery.png" alt="Title Gallery"
         class="article__titleGalery">
      </div>
      <div class="articles__row">
        <div class="article__photos photo__scale" id="more-exhibitions">
          <img src="src/img/Layer 46@1,5x.png" alt="acticlePhoto"
            class="article__photo">
        </div>
        <div class="article__photos photo__scale">
          <img src="src/img/Layer 47@1,5x.png" alt="acticlePhoto"
            class="article__photo-title">
        </div>
      </div>
      <div class="acticle__photos acticle__photos--title">
        <img src="src/img/A New Look at Old Masters.png" alt="acticlePhoto"
        class="acticle__paragraph">
      </div>
      <div class="acticle__photos article__date-wrap">
        <img src="src/img/December 12, 2020 – Through Spring 2023.png" alt="Decebmer 12"
        class="article__date">
      </div>
      <div class="articles__row articles__row--gap">
        <div class="article__photos article__photos--gap photo__scale">
          <img src="src/img/Layer 48@1,5x.png" alt="acticlePhotoTwo"
            class="article__photo-two">
        </div>
        <div class="article__photos article__photos--gap photo__scale">
          <img src="src/img/Layer 49@1,5x.png" alt="acticlePhotoTwo"
            class="article__photo-two">
        </div>
        <div class="article__photos article__photos--gap photo__scale">
          <img src="src/img/Layer 50@1,5.png" alt="acticlePhotoTwo"
            class="article__photo-two">
        </div>
      </div>

      <div class="acticle__photos acticle__photos--next-title">
        <img src="src/img/Bodhisattvas of Wisdom, Compassion, and Power.png" alt="acticlePhoto"
          class="acticle__paragraph-next">
      </div>

      <div class="acticle__photos acticle__photos--date-next">
        <img src="src/img/March 27, 2021 – October 30, 2022.png" alt="acticlePhoto"
          class="acticle__paragraph-date">
      </div>

      <div class="articles__row articles__row--last">
        <div class="article__photos photo__scale">
          <img src="/src/img/Layer 51@1,5x.png" alt="acticlePhotoThree"
            class="article__photo__first">
        </div>
        <div class="article__photos photo__scale">
          <img src="/src/img/Layer 52@1,5x.png" alt="acticlePhotoThree"
            class="article__photo__first article__photo__second">
        </div>
      </div>
      <div class="article__photos acticle__photos--inspiring-title">
        <img src="src/img/Inspiring Walt Disney_ The Animation of French Decorative Arts.png" alt="acticlePhotoThree"
          class="acticle__paragraph-next-photos">
      </div>
      <div class="article__photos acticle__photos--inspiring-data">
        <img src="/src/img/December 10, 2021 – March 6, 2022.png" alt="acticlePhotoThree"
          class="acticle__paragraph-next-photos-data">
      </div>
      <a href="#more-exhibitions" class="article__button">View all exhibitions</a>
    </article>

    <div class="article__photos">
      <img src="/src/img/Title GalleryTwo.png" alt="Title GalleryTwo"
      class="articleGalelery__photo">
    </div>

    <article class="next__article">
      <div class="article__photos photo__scale">
        <img src="/src/img/Person 1.png" alt="person 1"
        class="next__article-photos">
      </div>
      <div class="article__photos photo__scale">
        <img src="/src/img/Person 2.png" alt="person 2"
         class="articleTwo__photo">
      </div>
      <div class="article__photos photo__scale">
        <img src="/src/img/Person 3.png" alt="person 3"
         class="articleTwo__photo">
      </div>
    </article>

    <section class="contact" id="contacts">
      <div class="contact__photo">
        <img src="/src/img/Contact.png" alt="contactPhoto"
         class="contact__photo">
      </div>

      <div class="photo__group">
        <img src="src/img/1 contacts group.png" alt="contactOnePhoto"
        class="group__photo-contact">
        <img src="src/img/2 contacts group.png" alt="contactTwoPhoto"
         class="second__photo-contact">
        <form class="contact__form" id="contactForm"
       onsubmit="return false">
          <input type="text" placeholder="Name"
          name="name" class="contact__input"
          required>
          <input type="email" placeholder="Email"
          name="email" class="contact__input"
          required>
          <textarea name="message" placeholder="Message"
          class="contact__textarea" required></textarea>
          <button type="submit" class="contact__submit">Send</button>
        </form>
      </div>
    </section>

    <footer class="footer">
      <div class="footer__content">
        <img src="src/img/Group 31.png" alt="Group31"
         class="footer__photo">
      </div>
    </footer>
  </body>
</html>
